    <head>
        <meta charset="UTF-8" />

        <meta

        <meta name="twitter:card" content="summary_large_image" />
        <meta

        <meta

        />

        <link
            rel="shortcut icon"
            href="https://eunxwlahgeqremjyymwp.supabase.co/storage/v1/object/public/virakboth/favicon.svg"
            type="image/x-icon"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./src/output.css" />
    </head>
    <body>
        <main class="flex justify-center items-center py-auto h-screen">
            <div
                class="w-full max-w-sm bg-white dark:bg-neutral-900 p-6 border border-gray-200 dark:border-neutral-800 rounded-2xl shadow-xs"
            >
                <form action="#">
                    <h5
                        class="text-xl font-semibold text-gray-900 dark:text-white mb-6"
                    >
                        Sign in to our Dashboard
                    </h5>
                    <div class="mb-4">
                        <label
                            for="email"
                            class="block mb-2.5 text-sm font-medium text-gray-900 dark:text-white"
                            >Your email</label
                        >
                        <input
                            type="email"
                            id="email"
                            class="bg-gray-50 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-900 dark:text-white text-sm rounded-2xl focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-gray-600 dark:placeholder:text-neutral-600"
                            placeholder="example@company.com"
                            required
                        />
                    </div>
                    <div>
                        <label
                            for="password"
                            class="block mb-2.5 text-sm font-medium text-gray-900 dark:text-white"
                            >Your password</label
                        >
                        <input
                            type="password"
                            id="password"
                            class="bg-gray-50 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-900 dark:text-white text-sm rounded-2xl focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-gray-600 dark:placeholder:text-neutral-600"
                            placeholder="•••••••••"
                            required
                        />
                    </div>
                    <div class="flex items-start my-6">
                        <div class="flex items-center">
                            <input
                                id="checkbox-remember"
                                type="checkbox"
                                value=""
                                class="w-4 h-4 border border-gray-200 rounded-xs bg-gray-50 focus:ring-2 focus:ring-blue-100"
                            />
                            <label
                                for="checkbox-remember"
                                class="ms-2 text-sm font-medium text-gray-900 dark:text-white"
                                >Remember me</label
                            >
                        </div>
                        <a
                            href="#"
                            class="ms-auto text-sm font-medium text-blue-700 hover:underline"
                            >Lost Password?</a
                        >
                    </div>
                    <a
                        href="dashboard_index.html"
                        class="block text-center text-white bg-blue-700 box-border border border-transparent hover:bg-blue-700 focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-2xl text-sm px-4 py-2.5 focus:outline-none w-full mb-3"
                        >Login into dashboard</a
                    >
                    <div class="text-sm font-medium text-gray-600">
                        Not registered?
                        <a
                            href="dashboard_index.html"
                            class="text-blue-700 hover:underline"
                            >You can enter anyways.</a
                        >
                    </div>
                </form>
            </div>
        </main>

        <script src="./node_modules/flowbite/dist/flowbite.min.js"></script>
    </body>
</html>
